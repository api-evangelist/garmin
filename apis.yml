    type: Review
    name: Garmin Health API Push surface review (2026-05-30)
  description: Inbound cloud API for receiving all-day health summary metrics from
    Garmin wearables — daily summaries, epoch summaries, sleep data, heart rate, steps,
    stress, Body Battery, pulse ox, respiration, user-logged metrics, and more. Requires
    approval as a Garmin Connect Developer Program partner; access is via OAuth-authenticated
