    name: Standard SDK
    type: SDKs
  description: Mobile SDKs for iOS and Android that pair directly with Garmin wearables
    over BLE and stream raw real-time sensor data — accelerometer, heart rate, pulse
    ox, respiration, stress, calories, steps, Body Battery, and device battery — plus
    configurable advanced streams (gyroscope, actigraphy, beat-to-beat intervals).
    Standard SDK ships HIPAA-compliant for healthcare deployments; Companion SDK combines
    real-time streaming with the cloud Health API. Enterprise license required.
