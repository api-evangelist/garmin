description: Garmin is the global leader in GPS-enabled wearables, cycling computers,
  outdoor handhelds, marine electronics, aviation avionics, and automotive navigation.
  Garmin's developer surface spans the Connect IQ wearable app platform (Monkey C,
  watch faces, data fields, widgets, device apps), the Garmin Connect Developer Program
  cloud APIs (Health, Activity, Women's Health, Training, Courses), the Health SDK
  for direct BLE streaming from wearables, the FIT SDK that defines the industry's
  de-facto endurance data interchange format, Navionics marine cartography, inReach
  satellite messaging, the ANT/ANT+ wireless protocol, and specialized APIs for golf,
  aviation flight data, fleet telematics, and custom outdoor maps.
