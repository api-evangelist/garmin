  description: The Flexible and Interoperable Data Transfer (FIT) protocol is Garmin's
    compact binary file format for sport, fitness, and health data — activities, courses,
    workouts, monitoring files, settings, and more. The FIT SDK ships encoders and
    decoders in eight languages (C, C++, C#, Java, JavaScript, Objective-C, Python,
    Swift), the FitCSVTool for binary-to-text inspection, FitGen.exe for profile customization,
    and the canonical Profile.xlsx defining every FIT message and field. FIT is the
    de-facto interchange format across Strava, TrainingPeaks, Komoot, Wahoo, Polar,
    Suunto, Apple Health, Google Fit, and the entire endurance-sport tooling ecosystem.
