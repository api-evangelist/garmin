- type: Features
  data:
  - Connect IQ wearable application platform with Monkey C, device simulators, and
    VS Code extension (SDK 9.1.0)
  - Five Connect IQ app types — watch faces, data fields, widgets, device apps, audio
    content providers
  - Connect IQ Store at apps.garmin.com for app distribution and monetization
  - Connect IQ Android SDK (Maven Central) and iOS Companion SDK for phone-to-watch
    communication
  - Garmin Connect Developer Program cloud APIs — Health, Activity, Women's Health,
    Training, Courses
  - Inbound APIs (Health, Activity, Women's Health) for receiving user data into partner
    platforms
  - Outbound APIs (Training, Courses) for pushing workouts and routes onto user devices
  - Garmin Health SDK — Standard (HIPAA-compliant) and Companion variants for iOS/Android
  - Real-time BLE streaming of accelerometer, heart rate, pulse ox, respiration, stress,
    Body Battery
  - FIT SDK in eight languages (C, C++, C#, Java, JavaScript, Objective-C, Python,
    Swift) — the industry interchange format for endurance sport data
  - FIT SDK Tools — FitCSVTool, FitGen, FitToolsUI for binary file inspection and
    profile customization
  - Navionics marine cartography Web API and iOS/Android mobile SDK
  - inReach Portal Connect for satellite-messaging and tracking integrations over
    Iridium
  - ANT and ANT+ ultra-low-power 2.4GHz wireless protocol with standardized device
    profiles
  - Garmin Golf API for scorecards, launch monitor metrics, and per-shot GPS data
  - Tacx smart trainer ANT+ FE-C and BLE FTMS communication protocols
  - Varia cycling radar BLE GATT service for third-party head units
  - Garmin Aviation Flight Data Log API for G1000/G3000/G5000 fleet operators
  - Garmin Fleet integration APIs for commercial vehicle telematics
  - KMZ Custom Maps specification for outdoor handhelds and fitness watches
  - LIDAR-Lite Arduino library for the LIDAR-Lite v3/v4 optical distance sensors
  - Active developer forums at forums.garmin.com/developer
