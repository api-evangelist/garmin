  description: Connect IQ is Garmin's open platform for building wearable apps that
    run on Garmin watches and cycling computers. Developers write apps in Monkey C
    — Garmin's purpose-built object-oriented language — and target five app categories
    (watch faces, data fields, widgets, device apps, audio content provider apps).
    The SDK ships with device simulators, a VS Code Monkey C extension, and companion
    mobile SDKs for Android (Maven Central) and iOS (GitHub) so phone apps can talk
    to Connect IQ apps over BLE. Apps are distributed through the Connect IQ Store
    at apps.garmin.com. Current SDK version 9.1.0 (May 2026).
- aid: garmin:garmin-connect-health-api
  name: Garmin Connect Health API
  tags:
